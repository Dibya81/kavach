<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Police HQ | KAVACH Intelligence</title>
  <link rel="stylesheet" href="css/kavach.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .police-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .police-stat-card {
      background: var(--card-bg);
      backdrop-filter: var(--glass);
      border: var(--card-border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 120px;
    }

    .police-stat-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
    }

    .police-stat-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--cyber-blue);
      opacity: 0.6;
    }

    .police-stat-card.urgent::after { background: var(--critical-red); }
    .police-stat-card.verified::after { background: var(--safe-green); }

    .stat-val { 
      font-size: 36px; 
      font-weight: 800; 
      color: var(--text-pure); 
      margin-top: 12px; 
      font-family: var(--font-mono);
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }
    .stat-label { 
      font-size: 11px; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      font-weight: 700; 
    }

    .police-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
    }

    .panel {
      background: var(--card-bg);
      backdrop-filter: var(--glass);
      border: var(--card-border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 280px);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .panel-header {
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.01);
    }

    .panel-title { 
      font-size: 14px; 
      font-weight: 800; 
      color: var(--text-pure); 
      text-transform: uppercase; 
      letter-spacing: 1.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .fir-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .fir-item {
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      background: rgba(255, 255, 255, 0.01);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .fir-item:hover { 
      background: rgba(255, 255, 255, 0.04); 
      border-color: rgba(255, 255, 255, 0.1); 
      transform: translateX(4px);
    }
    .fir-item.active { 
      background: rgba(0, 210, 255, 0.08); 
      border-color: rgba(0, 210, 255, 0.3); 
      box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.05);
    }

    .fir-meta { display: flex; gap: 12px; margin-bottom: 10px; align-items: center; }
    .fir-id { font-family: var(--font-mono); color: var(--cyber-blue); font-weight: 700; font-size: 12px; letter-spacing: 0.5px; }
    .fir-type { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .fir-desc { font-size: 13px; color: rgba(255, 255, 255, 0.7); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .detail-view {
      padding: 32px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .detail-section { margin-bottom: 32px; }
    .detail-label { font-size: 10px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }
    .detail-content { font-size: 15px; color: var(--text-pure); line-height: 1.7; }

    .action-bar {
      margin-top: 32px;
      display: flex;
      gap: 16px;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-verify { background: var(--safe-green); color: #051a10; border: none; padding: 14px 28px; border-radius: 10px; cursor: pointer; font-weight: 800; flex: 1; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
    .btn-reject { background: var(--critical-red); color: white; border: none; padding: 14px 28px; border-radius: 10px; cursor: pointer; font-weight: 800; flex: 1; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; font-size: 12px; }
    
    .btn-verify:hover { background: #00ff84; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
    .btn-reject:hover { background: #ff4d7d; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3); }

    .badge-status { padding: 6px 12px; border-radius: 100px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .badge-PENDING { background: rgba(255, 176, 32, 0.1); color: #FFB020; border: 1px solid rgba(255, 176, 32, 0.2); }
    .badge-VERIFIED { background: rgba(0, 230, 118, 0.1); color: var(--safe-green); border: 1px solid rgba(0, 230, 118, 0.2); }
    .badge-REJECTED { background: rgba(255, 51, 102, 0.1); color: var(--critical-red); border: 1px solid rgba(255, 51, 102, 0.2); }

    .audit-log {
      margin-top: 20px;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .audit-entry {
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      border-left: 3px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      line-height: 1.5;
    }

    .audit-entry span { color: var(--text-pure); font-weight: 700; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      padding: 40px;
      border-radius: 24px;
      width: 480px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 24px; color: var(--text-pure); letter-spacing: -0.5px; }
    textarea { 
      width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 14px; color: var(--text-pure); padding: 18px; margin-bottom: 32px; height: 140px; 
      font-family: var(--font-ui); font-size: 15px; outline: none; transition: border-color 0.3s;
      resize: none;
    }
    textarea:focus { border-color: var(--cyber-blue); background: rgba(255, 255, 255, 0.05); }

    /* Sentinel Detections mini-list */
    .sentinel-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      transition: var(--transition);
      margin-bottom: 12px;
    }
    .sentinel-card:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.1); }

    .sentinel-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
    .sentinel-type { font-weight: 800; color: var(--critical-red); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div id="shell"></div>

  <!-- Rejection Modal -->
  <div id="reject-modal" class="modal">
    <div class="modal-content">
      <div class="modal-title">Reason for Rejection</div>
      <textarea id="rejection-reason" placeholder="Explain why this FIR is being rejected..."></textarea>
      <div style="display:flex; gap:10px">
        <button class="btn-reject" onclick="submitPoliceAction('REJECTED')">Confirm Rejection</button>
        <button class="btn-logout" style="background:var(--bg3); flex:1" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let currentFirs = [];
    let selectedFirId = null;

    async function init() {
      renderShell('POLICE HQ', 'Intelligent Case Management & Automated Verification', `
        <div class="police-stats">
          <div class="police-stat-card urgent">
            <div class="stat-label">Pending Review</div>
            <div class="stat-val" id="stat-pending">0</div>
            <i class="fas fa-clock card-icon-bg" style="opacity:0.05; position:absolute; right:-10px; bottom:-10px; font-size:60px;"></i>
          </div>
          <div class="police-stat-card verified">
            <div class="stat-label">Verified Cases</div>
            <div class="stat-val" id="stat-verified">0</div>
            <i class="fas fa-check-circle card-icon-bg" style="opacity:0.05; position:absolute; right:-10px; bottom:-10px; font-size:60px;"></i>
          </div>
          <div class="police-stat-card">
            <div class="stat-label">Rejected cases</div>
            <div class="stat-val" id="stat-rejected">0</div>
            <i class="fas fa-times-circle card-icon-bg" style="opacity:0.05; position:absolute; right:-10px; bottom:-10px; font-size:60px;"></i>
          </div>
          <div class="police-stat-card">
            <div class="stat-label">AI Detections</div>
            <div class="stat-val" id="stat-detections">0</div>
            <i class="fas fa-brain card-icon-bg" style="opacity:0.05; position:absolute; right:-10px; bottom:-10px; font-size:60px;"></i>
          </div>
        </div>

        <div class="police-grid">
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title"><i class="fas fa-list-ul" style="margin-right:8px; color:var(--cyber-blue)"></i>FIR Queue</div>
              <button class="btn btn-outline" style="padding:6px 12px; font-size:10px;" onclick="loadFirs()"><i class="fas fa-sync-alt"></i> REFRESH</button>
            </div>
            <div class="fir-list" id="fir-list">
              <div style="padding:40px; text-align:center; color:var(--text-muted)">
                <i class="fas fa-spinner fa-spin" style="font-size:24px; margin-bottom:12px;"></i>
                <div>Loading queue...</div>
              </div>
            </div>
          </div>

          <div class="panel" id="fir-detail-panel" style="display:none">
            <div class="panel-header">
              <div class="panel-title"><i class="fas fa-file-invoice" style="margin-right:8px; color:var(--cyber-blue)"></i>Case Details</div>
            </div>
            <div class="detail-view" id="fir-detail-content">
              <!-- Rendered dynamically -->
            </div>
          </div>

          <div class="panel" id="placeholder-panel">
            <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; color:var(--text-muted); padding:40px; text-align:center">
              <div style="font-size:48px; margin-bottom:24px; opacity:0.3"><i class="fas fa-folder-open"></i></div>
              <div style="font-size:14px; font-weight:500;">Select an FIR from the queue</div>
              <div style="font-size:12px; margin-top:8px; opacity:0.6;">Review evidence and take verification actions.</div>
            </div>
          </div>
        </div>

        <div class="panel" style="margin-top:24px; max-height:400px">
          <div class="panel-header">
            <div class="panel-title"><i class="fas fa-broadcast-tower" style="margin-right:8px; color:var(--critical-red)"></i>Real-time Sentinel Detections</div>
          </div>
          <div class="fir-list" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; padding:20px" id="sentinel-list">
            <div style="color:var(--text-muted); font-size:12px">Waiting for detection events...</div>
          </div>
        </div>
      `);

      loadStats();
      loadFirs();
      loadDetections();
    }

    async function loadStats() {
      try {
        const res = await fetch(KAVACH.POLICE + '/stats');
        const data = await res.json();
        document.getElementById('stat-pending').textContent = data.pending_firs || 0;
        document.getElementById('stat-verified').textContent = data.verified_firs || 0;
        document.getElementById('stat-rejected').textContent = data.rejected_firs || 0;
        document.getElementById('stat-detections').textContent = data.total_detections || 0;
      } catch(e) {}
    }

    async function loadFirs() {
      try {
        const res = await fetch(KAVACH.BASE + '/api/fir');
        currentFirs = await res.json();
        renderFirList();
      } catch(e) {}
    }

    async function loadDetections() {
      try {
        const res = await fetch(KAVACH.POLICE + '/detections');
        const data = await res.json();
        const list = document.getElementById('sentinel-list');
        list.innerHTML = data.map(d => `
          <div class="sentinel-card">
            <div class="sentinel-header">
              <span class="sentinel-type">${d.detection_type}</span>
              <span style="color:var(--police-gold)">${Math.round(d.confidence * 100)}%</span>
            </div>
            <div style="color:var(--text1); margin-bottom:5px">📍 ${d.location}</div>
            <div style="color:var(--text3); font-size:10px">${new Date(d.created_at).toLocaleString()}</div>
          </div>
        `).join('') || '<div style="color:var(--text3); font-size:12px">No detections logged yet.</div>';
      } catch(e) {}
    }

    function renderFirList() {
      const list = document.getElementById('fir-list');
      list.innerHTML = currentFirs.map(fir => `
        <div class="fir-item ${selectedFirId === fir.fir_id ? 'active' : ''}" onclick="selectFir('${fir.fir_id}')">
          <div class="fir-meta">
            <span class="fir-id">${fir.fir_id}</span>
            <span class="badge-status badge-${fir.workflow_status}">${fir.workflow_status}</span>
          </div>
          <div class="fir-desc">${fir.description}</div>
          <div style="font-size:10px; color:var(--text-muted); margin-top:8px; display:flex; align-items:center; gap:12px;">
            <span><i class="fas fa-map-marker-alt"></i> ${fir.location}</span>
            <span><i class="fas fa-calendar-alt"></i> ${fir.date_of_incident}</span>
          </div>
        </div>
      `).join('') || '<div style="padding:40px; text-align:center; color:var(--text-muted)">No cases in queue.</div>';
    }

    async function selectFir(id) {
      selectedFirId = id;
      renderFirList();
      
      const fir = currentFirs.find(f => f.fir_id === id);
      document.getElementById('placeholder-panel').style.display = 'none';
      document.getElementById('fir-detail-panel').style.display = 'flex';

      // Load audit trail
      let auditHtml = '<div class="audit-entry">No audit trail available.</div>';
      try {
        const aRes = await fetch(KAVACH.POLICE + '/audit/' + id);
        const audits = await aRes.json();
        if (audits.length) {
          auditHtml = audits.map(a => `
            <div class="audit-entry">
              [${new Date(a.timestamp).toLocaleTimeString()}] 
              <span>${a.action}</span> by <b>${a.performed_by}</b>
              <br><small>${a.reason}</small>
            </div>
          `).join('');
        }
      } catch(e) {}

      document.getElementById('fir-detail-content').innerHTML = `
        <div class="detail-section">
          <div class="detail-label">Complainant Information</div>
          <div class="detail-content" style="font-weight:700; font-size:16px;">${fir.complainant}</div>
          <div class="muted" style="font-size:12px;">Primary Reporter / Victim</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">Incident Description</div>
          <div class="detail-content" style="background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); padding:16px; border-radius:12px; font-size:13px;">${fir.description}</div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:24px;">
          <div class="detail-section" style="margin-bottom:0">
            <div class="detail-label">Location</div>
            <div class="detail-content"><i class="fas fa-location-dot" style="color:var(--cyber-blue); margin-right:6px;"></i> ${fir.location}</div>
          </div>
          <div class="detail-section" style="margin-bottom:0">
            <div class="detail-label">Priority Level</div>
            <div class="detail-content"><span class="badge ${fir.priority === 'HIGH' ? 'badge-danger' : 'badge-warning'}">${fir.priority}</span></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-label">Digital Evidence Fingerprint</div>
          <div class="detail-content" style="font-family:var(--font-mono); font-size:11px; word-break:break-all; color:var(--cyber-blue); background:rgba(0,210,255,0.05); padding:8px; border-radius:6px;">${fir.fir_hash}</div>
        </div>

        ${fir.workflow_status === 'PENDING' ? `
          <div class="action-bar">
            <button class="btn-verify" onclick="submitPoliceAction('VERIFIED')"><i class="fas fa-check"></i> Approve & Process</button>
            <button class="btn-reject" onclick="openRejectModal()"><i class="fas fa-ban"></i> Reject FIR</button>
          </div>
        ` : `
          <div class="detail-section" style="background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); padding:20px; border-radius:16px">
            <div class="detail-label">Case Outcome</div>
            <div class="detail-content">
              Status: <span class="badge-status badge-${fir.workflow_status}">${fir.workflow_status}</span><br>
              <div style="margin-top:12px; font-size:12px; color:var(--text-muted)">
                Processed by <b>${fir.reviewed_by || 'HQ-SYSTEM'}</b><br>
                Time: ${fir.reviewed_at ? new Date(fir.reviewed_at).toLocaleString() : '—'}
              </div>
              ${fir.rejection_reason ? `<div style="margin-top:12px; padding:12px; background:rgba(255,51,102,0.05); border-radius:8px; color:var(--critical-red); font-size:12px;"><b>REASON:</b> ${fir.rejection_reason}</div>` : ''}
            </div>
          </div>
        `}

        <div class="detail-section" style="margin-top:32px;">
          <div class="detail-label" style="display:flex; justify-content:space-between">
            <span>Audit History</span>
            <i class="fas fa-shield-halved" style="opacity:0.3"></i>
          </div>
          <div class="audit-log">${auditHtml}</div>
        </div>
      `;
    }

    function openRejectModal() {
      document.getElementById('reject-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('reject-modal').style.display = 'none';
    }

    async function submitPoliceAction(status) {
      const officer = getOfficer().name || 'ADMIN-HQ';
      const reason = document.getElementById('rejection-reason').value;

      if (status === 'REJECTED' && !reason) {
        alert('Please provide a reason for rejection.');
        return;
      }

      try {
        const res = await fetch(KAVACH.POLICE + '/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fir_id: selectedFirId,
            status: status,
            officer: officer,
            reason: reason
          })
        });

        if (res.ok) {
          closeModal();
          await loadFirs();
          await loadStats();
          if (selectedFirId) selectFir(selectedFirId);
        }
      } catch(e) {
        alert('Failed to update FIR status.');
      }
    }

    // Handle incoming alerts to refresh detections if high risk
    onAlert(data => {
      if (data.type === 'THREAT_DETECTION' || data.type === 'WEAPON_DETECTED') {
        loadDetections();
        loadStats();
      }
    });

    init();
  </script>
</body>
</html>
